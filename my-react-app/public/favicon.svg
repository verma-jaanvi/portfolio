<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Outer ring gradient: violet → cyan -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Core gradient: cyan → magenta -->
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <!-- Outer glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Core glow filter -->
    <filter id="coreGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0D0D1A"/>

  <!-- Outer gradient ring -->
  <circle cx="16" cy="16" r="13" fill="url(#ring)" filter="url(#glow)" opacity="0.95"/>

  <!-- Dark inner circle (creates ring effect) -->
  <circle cx="16" cy="16" r="9.5" fill="#0D0D1A"/>

  <!-- Second inner ring (faint violet) -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#8B5CF6" stroke-width="0.6" opacity="0.5"/>

  <!-- Glowing core -->
  <circle cx="16" cy="16" r="4" fill="url(#core)" filter="url(#coreGlow)" opacity="0.95"/>
</svg>
